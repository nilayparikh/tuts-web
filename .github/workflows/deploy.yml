name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; cancel in-progress runs
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    name: Build Next.js static export
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          # package-lock.json is at the repo root (no _tuts/ subdirectory)
          cache-dependency-path: package-lock.json

      # _common is a git submodule (checked out above with submodules: recursive).
      # npm install picks up the framework via the file:./_common/... reference.
      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build
        env:
          # Uncomment and set basePath/assetPrefix in next.config.ts if deploying
          # to a GitHub project page sub-path: https://nilayparikh.github.io/<repo>/
          # NEXT_PUBLIC_BASE_PATH: /<repo-name>
          NODE_ENV: production

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Static export goes to ./out at repo root
          path: out

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
